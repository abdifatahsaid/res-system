<!DOCTYPE html>
<html lang="so">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Menu — RES SYSTEM</title>
<link rel="manifest" href="/static/manifest.json">
<meta name="theme-color" content="#FF6B35">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="RES SYSTEM">
<link rel="apple-touch-icon" href="/static/images/icon-192.png">
<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
<div class="app-layout">
  <aside class="sidebar">
    <div class="sidebar-logo">
      <div class="logo-circle">🏪</div>
      <h2>RES SYSTEM</h2>
      <p>Admin Panel</p>
    </div>
    <nav class="sidebar-nav">
      <a href="/admin/dashboard"   class="nav-item"><span class="nav-icon">🏠</span> Home</a>
      <a href="/admin/live-orders" class="nav-item"><span class="nav-icon">📦</span> Live Orders</a>
      <a href="/admin/menu"        class="nav-item active"><span class="nav-icon">🍽️</span> Menu</a>
      <a href="/admin/payments"    class="nav-item"><span class="nav-icon">💳</span> Payment History</a>
      <a href="/admin/about"       class="nav-item"><span class="nav-icon">ℹ️</span> About</a>
      <a href="/logout"            class="nav-item logout"><span class="nav-icon">🚪</span> Logout</a>
    </nav>
    <div class="sidebar-footer">© Created By Abdifatah Said</div>
  </aside>
  <div class="sidebar-overlay"></div>

  <main class="main-content">
    <div class="topbar">
      <div style="display:flex;align-items:center;gap:12px;">
        <button class="hamburger">☰</button>
        <span class="topbar-title">🍽️ Menu Management</span>
      </div>
    </div>

    <div class="page-content">
      <div class="category-filters" style="margin-bottom:24px;">
        <button class="cat-btn food active" onclick="loadCategory('food',this)">🍔 Food</button>
        <button class="cat-btn shopping"    onclick="loadCategory('shopping',this)">🛍️ Shopping</button>
        <button class="cat-btn khudaar"     onclick="loadCategory('khudaar',this)">🥦 Khudaar</button>
        <button class="cat-btn raashin"     onclick="loadCategory('raashin',this)">🌾 Raashin</button>
      </div>

      <div style="margin-bottom:20px;">
        <button class="btn btn-primary btn-lg" onclick="openAddModal()" id="addBtn">➕ Add Food</button>
      </div>

      <div class="menu-grid" id="menuGrid">
        <div class="spinner"></div>
      </div>
    </div>

    <footer class="footer">
      📞 <strong>+252907899345</strong> &nbsp;|&nbsp; © Created By Abdifatah Said
    </footer>
  </main>
</div>

<!-- ADD MODAL -->
<div class="modal-overlay" id="addItemModal">
  <div class="modal" style="max-width:400px;">
    <div class="modal-header">
      <span class="modal-title" id="addModalTitle">➕ Add Food</span>
      <button class="modal-close" onclick="closeModal('addItemModal')">✕</button>
    </div>

    <!-- Image Circle -->
    <div style="position:relative;width:160px;height:160px;margin:0 auto 20px;">
      <div id="imgCircle"
        style="width:160px;height:160px;border-radius:50%;border:3px dashed rgba(255,107,53,0.5);background:rgba(255,107,53,0.07);display:flex;align-items:center;justify-content:center;flex-direction:column;overflow:hidden;cursor:pointer;transition:all 0.3s;"
        onclick="document.getElementById('imgInput').click()"
        onmouseover="this.style.borderColor='var(--primary)'"
        onmouseout="this.style.borderColor='rgba(255,107,53,0.5)'">
        <div id="imgPlaceholder" style="text-align:center;">
          <div style="font-size:38px;margin-bottom:6px;">📷</div>
          <div style="font-size:11px;color:var(--text2);font-weight:600;">Sawir dooro</div>
        </div>
        <img id="imgPreview" src="" alt="" style="display:none;width:100%;height:100%;object-fit:cover;border-radius:50%;">
      </div>
      <!-- Price badge -->
      <div id="priceBadge"
        style="position:absolute;bottom:4px;right:4px;width:50px;height:50px;border-radius:50%;background:linear-gradient(135deg,var(--primary),#FF8C42);border:3px solid #16213E;display:flex;align-items:center;justify-content:center;cursor:pointer;z-index:2;box-shadow:0 4px 12px rgba(255,107,53,0.5);"
        onclick="event.stopPropagation();document.getElementById('priceInput').focus()">
        <span id="priceBadgeText" style="font-size:11px;font-weight:800;color:white;">$0</span>
      </div>
    </div>

    <input type="file" id="imgInput" accept="image/*" style="display:none" onchange="previewImage(this)">

    <!-- Upload status bar -->
    <div id="uploadStatus" style="display:none;text-align:center;font-size:12px;font-weight:600;padding:8px 14px;border-radius:8px;margin-bottom:12px;background:rgba(255,255,255,0.06);"></div>

    <label class="form-label">Magaca Item-ka</label>
    <input class="form-input" id="itemName" placeholder="Tusaale: Pizza, Shaah, Bariis...">

    <label class="form-label">Qiimaha ($)</label>
    <input class="form-input" id="priceInput" type="number" placeholder="0.00" step="0.01" min="0"
      oninput="document.getElementById('priceBadgeText').textContent=this.value?'$'+parseFloat(this.value).toFixed(0):'$0'">

    <div style="display:flex;gap:10px;margin-top:16px;">
      <button class="btn btn-success btn-lg" style="flex:1;" onclick="saveItem()" id="saveBtn">💾 Save</button>
      <button class="btn btn-outline" style="flex:1;" onclick="closeModal('addItemModal')">Cancel</button>
    </div>
  </div>
</div>

<script src="{{ url_for('static', filename='js/main.js') }}"></script>
<script>
let currentCategory = 'food';
let uploadedImageUrl = '';

async function loadCategory(cat, btn) {
  currentCategory = cat;
  if (btn) {
    document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
  }
  const label = cat.charAt(0).toUpperCase() + cat.slice(1);
  document.getElementById('addBtn').textContent = `➕ Add ${label}`;
  const grid = document.getElementById('menuGrid');
  grid.innerHTML = '<div class="spinner"></div>';

  const data = await apiGet(`/api/menu/${cat}`);
  if (!data.items || !data.items.length) {
    grid.innerHTML = `<div class="card" style="grid-column:1/-1;text-align:center;padding:48px;color:var(--text2);">
      <div style="font-size:48px;margin-bottom:12px;">🍽️</div>
      <div style="font-weight:600;">Item kuma jiro — ➕ ku dar!</div>
    </div>`;
    return;
  }

  const icons = {food:'🍔', shopping:'🛍️', khudaar:'🥦', raashin:'🌾'};
  grid.innerHTML = data.items.map(item => `
    <div class="menu-item-card">
      <div style="width:100%;aspect-ratio:1;position:relative;overflow:hidden;border-radius:16px 16px 0 0;background:rgba(255,255,255,0.04);">
        ${item.Image_URL
          ? `<img src="${item.Image_URL}" alt="${item.Name}"
               style="width:100%;height:100%;object-fit:cover;"
               onerror="this.parentElement.innerHTML='<div style=\\'display:flex;align-items:center;justify-content:center;height:100%;font-size:52px;\\'>${icons[cat]||'🍽️'}</div>'">`
          : `<div style="display:flex;align-items:center;justify-content:center;height:100%;font-size:52px;">${icons[cat]||'🍽️'}</div>`
        }
        <div style="position:absolute;bottom:8px;right:8px;background:linear-gradient(135deg,var(--primary),#FF8C42);color:white;font-size:13px;font-weight:800;padding:5px 12px;border-radius:50px;">
          $${parseFloat(item.Price||0).toFixed(2)}
        </div>
      </div>
      <div class="menu-item-info">
        <div class="menu-item-name">${item.Name}</div>
        <div style="font-size:11px;color:var(--text2);margin-top:2px;">${item.Category||''}</div>
        <button class="btn btn-danger btn-sm" style="width:100%;margin-top:10px;" onclick="deleteItem('${item.ID}')">
          🗑️ Delete
        </button>
      </div>
    </div>
  `).join('');
}

function openAddModal() {
  uploadedImageUrl = '';
  document.getElementById('imgPreview').style.display = 'none';
  document.getElementById('imgPlaceholder').style.display = 'block';
  document.getElementById('itemName').value = '';
  document.getElementById('priceInput').value = '';
  document.getElementById('priceBadgeText').textContent = '$0';
  document.getElementById('imgInput').value = '';
  document.getElementById('uploadStatus').style.display = 'none';
  const label = currentCategory.charAt(0).toUpperCase() + currentCategory.slice(1);
  document.getElementById('addModalTitle').textContent = `➕ Add ${label}`;
  openModal('addItemModal');
}

async function previewImage(input) {
  const file = input.files[0];
  if (!file) return;

  // Check file size
  const sizeMB = (file.size / 1024 / 1024).toFixed(1);

  // 1. Show preview immediately
  const reader = new FileReader();
  reader.onload = e => {
    document.getElementById('imgPreview').src = e.target.result;
    document.getElementById('imgPreview').style.display = 'block';
    document.getElementById('imgPlaceholder').style.display = 'none';
  };
  reader.readAsDataURL(file);

  // 2. Upload + compress on server → base64 (works on ALL mobile devices)
  setStatus('⏳ Sawirka la compress garaynaa...', '#F39C12');

  try {
    const fd = new FormData();
    fd.append('image', file);
    const res  = await fetch('/api/menu/upload-image-local', { method: 'POST', body: fd });
    const json = await res.json();

    if (json.success) {
      uploadedImageUrl = json.url;
      const isBase64 = json.url.startsWith('data:');
      if (isBase64) {
        const kb = Math.round(json.url.length * 0.75 / 1024);
        setStatus(`✅ Sawirka diyaar! (${kb}KB — mobile iyo laptop labadaba arki karaan)`, 'var(--green)');
      } else {
        setStatus('✅ Sawirka si sax ah ayuu u keydiyay!', 'var(--green)');
      }
    } else {
      setStatus('❌ Upload failed: ' + (json.message||'Error'), '#E74C3C');
      uploadedImageUrl = '';
    }
  } catch(e) {
    setStatus('❌ Network error — server ma socdo?', '#E74C3C');
    uploadedImageUrl = '';
  }
}

function setStatus(msg, color) {
  const el = document.getElementById('uploadStatus');
  el.style.display = 'block';
  el.style.color = color;
  el.textContent = msg;
}

async function saveItem() {
  const name  = document.getElementById('itemName').value.trim();
  const price = document.getElementById('priceInput').value.trim();
  if (!name)  { showToast('⚠️ Magaca item-ka gali!', 'error'); return; }
  if (!price) { showToast('⚠️ Qiimaha gali!', 'error'); return; }

  const btn = document.getElementById('saveBtn');
  btn.textContent = '⏳ Saving...';
  btn.disabled = true;

  try {
    const res = await apiPost('/api/menu/add', {
      category:  currentCategory,
      name,
      price:     parseFloat(price),
      image_url: uploadedImageUrl || ''
    });

    if (res.success) {
      showToast(`✅ "${name}" si sax ah ayuu u keydiyay!`, 'success');
      closeModal('addItemModal');
      uploadedImageUrl = '';
      loadCategory(currentCategory);
    } else {
      showToast('❌ ' + (res.message || 'Error — try again'), 'error');
    }
  } catch(e) {
    showToast('❌ Network error!', 'error');
  } finally {
    btn.textContent = '💾 Save';
    btn.disabled = false;
  }
}

async function deleteItem(id) {
  if (!confirm('Item-kan delete gareeyaa?')) return;
  const res = await apiPost('/api/menu/delete', { category: currentCategory, id: String(id) });
  if (res.success) {
    showToast('🗑️ Item la tirtiry!', 'success');
    loadCategory(currentCategory);
  } else {
    showToast('❌ Delete failed', 'error');
  }
}

loadCategory('food');
</script>
<script>
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => navigator.serviceWorker.register('/sw.js'));
}
</script>
</body>
</html>
