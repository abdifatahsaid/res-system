<!DOCTYPE html>
<html lang="so">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="manifest" href="/static/manifest.json">
<meta name="theme-color" content="#FF6B35">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="RES SYSTEM">
<link rel="apple-touch-icon" href="/static/images/icon-192.png">
<title>Menu — RES SYSTEM</title>
<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
<style>
/* ── MENU EXTRA STYLES ── */
.cat-tabs {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  margin-bottom: 20px;
}

.cat-tab {
  padding: 10px 20px;
  border-radius: 50px;
  border: 2px solid rgba(255,255,255,0.15);
  background: rgba(255,255,255,0.05);
  color: var(--text2);
  font-family: 'Poppins', sans-serif;
  font-size: 13px;
  font-weight: 700;
  cursor: pointer;
  transition: all 0.3s ease;
  display: flex;
  align-items: center;
  gap: 6px;
}

.cat-tab:hover { transform: translateY(-2px); }
.cat-tab.active-food     { background: linear-gradient(135deg,var(--primary),#FF8C42); border-color: var(--primary); color: white; box-shadow: 0 4px 16px rgba(255,107,53,0.4); }
.cat-tab.active-shopping { background: linear-gradient(135deg,var(--blue),#5DADE2);    border-color: var(--blue);    color: white; box-shadow: 0 4px 16px rgba(52,152,219,0.4); }
.cat-tab.active-khudaar  { background: linear-gradient(135deg,var(--green),#58D68D);   border-color: var(--green);   color: white; box-shadow: 0 4px 16px rgba(39,174,96,0.4); }
.cat-tab.active-raashin  { background: linear-gradient(135deg,var(--purple),#BB8FCE);  border-color: var(--purple);  color: white; box-shadow: 0 4px 16px rgba(155,89,182,0.4); }

/* ── ITEM CARD ── */
.item-card {
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 20px;
  overflow: hidden;
  transition: all 0.35s cubic-bezier(0.34,1.56,0.64,1);
}

.item-card:hover {
  transform: translateY(-8px);
  border-color: rgba(255,107,53,0.4);
  box-shadow: 0 16px 40px rgba(0,0,0,0.3);
}

.item-card.has-item {
  border-color: var(--primary);
  box-shadow: 0 0 0 2px rgba(255,107,53,0.3);
}

.item-img-wrap {
  position: relative;
  width: 100%;
  aspect-ratio: 1;
  overflow: hidden;
  background: rgba(255,255,255,0.04);
}

.item-img-wrap img {
  width: 100%; height: 100%;
  object-fit: cover;
  transition: transform 0.4s ease;
}

.item-card:hover .item-img-wrap img { transform: scale(1.05); }

.item-price-badge {
  position: absolute;
  bottom: 8px; right: 8px;
  background: linear-gradient(135deg,var(--primary),#FF8C42);
  color: white;
  font-size: 13px;
  font-weight: 800;
  padding: 5px 12px;
  border-radius: 50px;
  box-shadow: 0 4px 12px rgba(255,107,53,0.5);
}

.item-info { padding: 14px; }

.item-name {
  font-weight: 700;
  font-size: 14px;
  color: white;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  margin-bottom: 10px;
}

/* ── QTY CONTROLS ── */
.qty-controls {
  display: flex;
  align-items: center;
  gap: 10px;
  justify-content: center;
}

.qty-btn {
  width: 34px; height: 34px;
  border-radius: 50%;
  border: none;
  cursor: pointer;
  font-size: 20px;
  font-weight: 800;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.2s cubic-bezier(0.34,1.56,0.64,1);
  outline: none;
}

.qty-btn:active { transform: scale(0.88); }

.qty-btn.minus {
  background: rgba(231,76,60,0.15);
  color: var(--red);
  border: 1.5px solid rgba(231,76,60,0.3);
}

.qty-btn.minus:hover {
  background: var(--red);
  color: white;
  transform: scale(1.1);
}

.qty-btn.plus {
  background: linear-gradient(135deg,var(--primary),#FF8C42);
  color: white;
  box-shadow: 0 4px 12px rgba(255,107,53,0.4);
}

.qty-btn.plus:hover { transform: scale(1.15); box-shadow: 0 6px 18px rgba(255,107,53,0.6); }

.qty-num {
  font-weight: 800;
  font-size: 18px;
  color: white;
  min-width: 28px;
  text-align: center;
  transition: all 0.2s;
}

.qty-num.bump {
  animation: qtyBump 0.25s cubic-bezier(0.34,1.56,0.64,1);
}

@keyframes qtyBump {
  0%   { transform: scale(1); }
  50%  { transform: scale(1.4); color: var(--primary); }
  100% { transform: scale(1); }
}

/* ── CART BAR ── */
.cart-total-bar {
  background: linear-gradient(90deg,#1A1A2E,#0F3460);
  border-top: 2px solid var(--primary);
  padding: 12px 20px;
}

.cart-bar-inner {
  display: flex;
  align-items: center;
  justify-content: space-between;
  max-width: 600px;
  margin: 0 auto;
}

/* ── CART MODAL ── */
.cart-item-row {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 12px 0;
  border-bottom: 1px solid rgba(255,255,255,0.06);
  animation: slideIn 0.3s ease;
}

.cart-item-img {
  width: 52px; height: 52px;
  border-radius: 12px;
  object-fit: cover;
  background: rgba(255,255,255,0.05);
  flex-shrink: 0;
}

.cart-item-details { flex: 1; }
.cart-item-name { font-weight: 700; font-size: 14px; color: white; }
.cart-item-sub  { font-size: 12px; color: var(--text2); margin-top: 2px; }
.cart-item-total { font-weight: 800; font-size: 16px; color: var(--primary); white-space: nowrap; }

/* ── CHECKOUT FORM ── */
.checkout-section {
  background: rgba(255,255,255,0.03);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 16px;
  padding: 16px;
  margin-bottom: 14px;
}

.checkout-section-title {
  font-size: 12px;
  font-weight: 700;
  color: var(--primary);
  text-transform: uppercase;
  letter-spacing: 1px;
  margin-bottom: 12px;
  display: flex;
  align-items: center;
  gap: 6px;
}

/* ── PAYMENT BTNS ── */
.pay-btn {
  flex: 1;
  background: rgba(255,255,255,0.05);
  border: 2px solid rgba(255,255,255,0.1);
  border-radius: 16px;
  padding: 14px 8px;
  cursor: pointer;
  transition: all 0.3s ease;
  text-align: center;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 6px;
}

.pay-btn:hover { transform: translateY(-4px); border-color: var(--primary); background: rgba(255,107,53,0.1); }
.pay-btn.selected { border-color: var(--green); background: rgba(39,174,96,0.1); box-shadow: 0 0 0 2px rgba(39,174,96,0.3); }

.pay-btn img { width: 52px; height: 52px; object-fit: contain; border-radius: 10px; }
.pay-btn span { font-size: 12px; font-weight: 700; color: white; }

/* ── SEND BTN ── */
.send-order-btn {
  width: 100%;
  padding: 18px;
  background: linear-gradient(135deg, var(--primary), #FF8C42);
  color: white;
  border: none;
  border-radius: 16px;
  font-family: 'Poppins', sans-serif;
  font-size: 16px;
  font-weight: 800;
  cursor: pointer;
  transition: all 0.3s ease;
  letter-spacing: 0.5px;
  margin-top: 8px;
  box-shadow: 0 8px 24px rgba(255,107,53,0.4);
}

.send-order-btn:hover { transform: translateY(-3px); box-shadow: 0 12px 32px rgba(255,107,53,0.6); }
.send-order-btn:active { transform: translateY(-1px); }
.send-order-btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
</style>
</head>

<script>
// ── STATE ──
let cart = {};           // { itemKey: { id, name, price, qty, category, image } }
let currentCat = 'food';
let menuCache = {};      // { category: items[] }
let chosenPayment = '';

const CAT_ICONS = { food:'🍔', shopping:'🛍️', khudaar:'🥦', raashin:'🌾' };

// ── SWITCH CATEGORY ──
async function switchCat(cat, btn) {
  currentCat = cat;
  // Update tab styles
  document.querySelectorAll('.cat-tab').forEach(b => {
    b.className = 'cat-tab';
  });
  btn.classList.add('active-' + cat);
  await renderMenu(cat);
}

// ── RENDER MENU ──
async function renderMenu(cat) {
  const grid = document.getElementById('menuGrid');
  grid.innerHTML = '<div class="spinner"></div>';

  // Use cache if available
  if (!menuCache[cat]) {
    const data = await apiGet('/api/menu/' + cat, 300);
    menuCache[cat] = data.items || [];
  }

  const items = menuCache[cat];

  if (!items.length) {
    grid.innerHTML = `
      <div class="card" style="grid-column:1/-1;text-align:center;padding:48px;color:var(--text2);">
        <div style="font-size:52px;margin-bottom:12px;">${CAT_ICONS[cat]}</div>
        <div style="font-weight:600;font-size:15px;">Item kuma jiro</div>
      </div>`;
    return;
  }

  grid.innerHTML = items.map(item => {
    const key = cat + '_' + item.ID;
    const qty = cart[key] ? cart[key].qty : 0;
    const hasItem = qty > 0;
    return `
      <div class="item-card ${hasItem ? 'has-item' : ''}" id="card-${key}">
        <div class="item-img-wrap">
          ${item.Image_URL
            ? `<img src="${item.Image_URL}" alt="${item.Name}"
                 onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">`
            : ''
          }
          <div style="display:${item.Image_URL ? 'none' : 'flex'};align-items:center;justify-content:center;height:100%;font-size:52px;aspect-ratio:1;">
            ${CAT_ICONS[cat]}
          </div>
          <div class="item-price-badge">$${parseFloat(item.Price||0).toFixed(2)}</div>
        </div>
        <div class="item-info">
          <div class="item-name">${item.Name}</div>
          <div class="qty-controls">
            <button class="qty-btn minus" onclick="changeQty('${key}','${item.Name}',${item.Price},'${cat}','${item.Image_URL||''}','${item.ID}',-1)">−</button>
            <span class="qty-num" id="qty-${key}">${qty}</span>
            <button class="qty-btn plus"  onclick="changeQty('${key}','${item.Name}',${item.Price},'${cat}','${item.Image_URL||''}','${item.ID}',1)">+</button>
          </div>
        </div>
      </div>`;
  }).join('');
}

// ── CHANGE QTY ──
function changeQty(key, name, price, category, image, id, delta) {
  if (!cart[key]) {
    cart[key] = { id, key, name, price: parseFloat(price), qty: 0, category, image };
  }
  cart[key].qty = Math.max(0, cart[key].qty + delta);
  if (cart[key].qty === 0) delete cart[key];

  // Update qty display
  const qtyEl = document.getElementById('qty-' + key);
  const cardEl = document.getElementById('card-' + key);
  const newQty = cart[key] ? cart[key].qty : 0;

  if (qtyEl) {
    qtyEl.textContent = newQty;
    qtyEl.classList.remove('bump');
    void qtyEl.offsetWidth; // reflow
    qtyEl.classList.add('bump');
  }
  if (cardEl) {
    cardEl.classList.toggle('has-item', newQty > 0);
  }

  updateCartBar();
}

// ── CART BAR ──
function updateCartBar() {
  const items = Object.values(cart);
  const total = items.reduce((s, i) => s + i.price * i.qty, 0);
  const count = items.reduce((s, i) => s + i.qty, 0);

  document.getElementById('cartCountTop').textContent = count;
  document.getElementById('cartBarCount').textContent = count + ' items';
  document.getElementById('cartBarTotal').textContent = '$' + total.toFixed(2);
  document.getElementById('cartBar').style.display = count > 0 ? 'block' : 'none';
}

// ── OPEN CART ──
function openCart() {
  const items = Object.values(cart);
  if (!items.length) { showToast('Cart waa madhan! 🛒', 'info'); return; }

  const total = items.reduce((s, i) => s + i.price * i.qty, 0);
  const count = items.reduce((s, i) => s + i.qty, 0);

  document.getElementById('cartModalCount').textContent = count + ' items';
  document.getElementById('cartModalTotal').textContent = total.toFixed(2);

  document.getElementById('cartItemsList').innerHTML = items.map(i => `
    <div class="cart-item-row">
      ${i.image
        ? `<img class="cart-item-img" src="${i.image}" alt="${i.name}" onerror="this.style.display='none'">`
        : `<div class="cart-item-img" style="display:flex;align-items:center;justify-content:center;font-size:24px;">${CAT_ICONS[i.category]}</div>`
      }
      <div class="cart-item-details">
        <div class="cart-item-name">${i.name}</div>
        <div class="cart-item-sub">
          <span style="background:rgba(255,107,53,0.15);color:var(--primary);padding:2px 8px;border-radius:50px;font-size:11px;font-weight:700;">${i.category}</span>
          &nbsp; $${i.price.toFixed(2)} × ${i.qty}
        </div>
      </div>
      <div class="cart-item-total">$${(i.price * i.qty).toFixed(2)}</div>
    </div>
  `).join('');

  openModal('cartModal');
}

// ── CLEAR CART ──
function clearCart() {
  cart = {};
  updateCartBar();
  // Reset all qty displays on current page
  document.querySelectorAll('.qty-num').forEach(el => el.textContent = '0');
  document.querySelectorAll('.item-card').forEach(el => el.classList.remove('has-item'));
  closeModal('cartModal');
  showToast('Cart la nadiifiyay 🗑️', 'info');
}

// ── CHECKOUT ──
function goToCheckout() {
  const items = Object.values(cart);
  if (!items.length) return;
  const total = items.reduce((s, i) => s + i.price * i.qty, 0);

  document.getElementById('ch_total').textContent = total.toFixed(2);
  document.getElementById('ch_summary').innerHTML = items.map(i => `
    <div style="display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid rgba(255,255,255,0.05);">
      <div style="display:flex;align-items:center;gap:8px;">
        <span style="font-size:16px;">${CAT_ICONS[i.category]}</span>
        <div>
          <div style="font-size:13px;font-weight:700;color:white;">${i.name}</div>
          <div style="font-size:11px;color:var(--text2);">${i.category} &nbsp;×&nbsp; ${i.qty}</div>
        </div>
      </div>
      <div style="font-weight:800;color:var(--primary);">$${(i.price*i.qty).toFixed(2)}</div>
    </div>
  `).join('');

  // Reset payment
  chosenPayment = '';
  document.querySelectorAll('.pay-btn').forEach(b => b.classList.remove('selected'));
  document.getElementById('paymentStatus').style.display = 'none';

  closeModal('cartModal');
  openModal('checkoutModal');
}

// ── PAYMENT ──
function payWith(company, number, btn) {
  const total = Object.values(cart).reduce((s, i) => s + i.price * i.qty, 0);
  chosenPayment = company;

  // Highlight selected
  document.querySelectorAll('.pay-btn').forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');

  // Show status
  const statusEl = document.getElementById('paymentStatus');
  statusEl.style.display = 'block';
  document.getElementById('paymentStatusText').textContent =
    `${company} la doortay — Total: $${total.toFixed(2)}`;

  // Dial
  const dial = number + total.toFixed(2).replace('.', '');
  setTimeout(() => { window.location.href = 'tel:' + dial; }, 400);
}

// ── SEND ORDER ──
let _orderSending = false;
async function sendOrder() {
  if (_orderSending) return; // prevent double send

  const name = document.getElementById('ch_name').value.trim();
  if (!name) { showToast('⚠️ Magacaaga gali!', 'error'); return; }

  const items = Object.values(cart);
  if (!items.length) { showToast('⚠️ Cart waa madhan!', 'error'); return; }

  _orderSending = true;
  const btn = document.getElementById('sendOrderBtn');
  btn.disabled = true;
  btn.textContent = '⏳ Sending...';

  const total = items.reduce((s, i) => s + i.price * i.qty, 0);

  const res = await apiPost('/api/customer/order', {
    full_name:   name,
    phone:       document.getElementById('ch_phone').value,
    city:        document.getElementById('ch_city').value,
    location:    document.getElementById('ch_location').value,
    district:    document.getElementById('ch_district').value,
    sender_name: document.getElementById('ch_sender').value,
    items: items.map(i => ({ name: i.name, qty: i.qty, price: i.price, category: i.category })),
    total,
    payment_method: chosenPayment || 'Unknown'
  });

  if (res.success) {
    showToast('🎉 Order la diray! ' + res.order_id, 'success');
    // Clear everything
    cart = {};
    updateCartBar();
    document.querySelectorAll('.qty-num').forEach(el => el.textContent = '0');
    document.querySelectorAll('.item-card').forEach(el => el.classList.remove('has-item'));
    closeModal('checkoutModal');
    chosenPayment = '';
    // Clear form
    ['ch_name','ch_phone','ch_city','ch_location','ch_district','ch_sender']
      .forEach(id => document.getElementById(id).value = '');
  } else {
    showToast('❌ Error! Try again', 'error');
  }

  _orderSending = false;
  btn.disabled = false;
  btn.textContent = '🚀 Send Order';
}

// ── INIT ──
renderMenu('food');
</script>
